<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Car Ad</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDCJd_l6yvNOAobeuEXcrOL_ylrjm7i6Bc",
    authDomain: "cars-ads-d8fa7.firebaseapp.com",
    projectId: "cars-ads-d8fa7",
    storageBucket: "cars-ads-d8fa7.firebasestorage.app",
    messagingSenderId: "953969326728",
    appId: "1:953969326728:web:3414561195d2062045bd3d",
    measurementId: "G-SZ5YD8W2J0"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
</head>
<body>
  <h2 id="formTitle">Upload Your Car Ad</h2>
  <form id="carForm">
    <label>Car Title</label>
    <input type="text" id="title" required><br><br>

    <label>Price</label>
    <input type="number" id="price" required><br><br>

    <label>Description</label>
    <textarea id="description" required></textarea><br><br>

    <label>Upload Image</label>
    <input type="file" id="image" accept="image/*"><br><br>

    <button type="submit">Save Ad</button>
  </form>

  <script>
    const form = document.getElementById('carForm');
    const titleInput = document.getElementById('title');
    const priceInput = document.getElementById('price');
    const descriptionInput = document.getElementById('description');
    const imageInput = document.getElementById('image');
    const formTitle = document.getElementById('formTitle');

    let ads = JSON.parse(localStorage.getItem('carAds')) || [];

    // Check if editing
    const urlParams = new URLSearchParams(window.location.search);
    const editIndex = urlParams.get('edit');

    if (editIndex !== null) {
      const ad = ads[editIndex];
      if (ad) {
        formTitle.textContent = "Edit Your Car Ad";
        titleInput.value = ad.title;
        priceInput.value = ad.price;
        descriptionInput.value = ad.description;
        // Image preview not shown here, but you could add it
      }
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const title = titleInput.value;
      const price = priceInput.value;
      const description = descriptionInput.value;
      const imageFile = imageInput.files[0];

      if (editIndex !== null) {
        // Editing existing ad
        if (imageFile) {
          const reader = new FileReader();
          reader.onload = function(event) {
            ads[editIndex] = {
              ...ads[editIndex],
              title,
              price,
              description,
              image: event.target.result
            };
            localStorage.setItem('carAds', JSON.stringify(ads));
            window.location.href = "ads.html";
          };
          reader.readAsDataURL(imageFile);
        } else {
          // Keep old image if not changed
          ads[editIndex] = {
            ...ads[editIndex],
            title,
            price,
            description
          };
          localStorage.setItem('carAds', JSON.stringify(ads));
          window.location.href = "ads.html";
        }
      } else {
        // Creating new ad
        const reader = new FileReader();
        reader.onload = function(event) {
          const ad = {
            title,
            price,
            description,
            image: event.target.result,
            uploader: "user@gmail.com" // Replace with actual logged-in user
          };
          ads.push(ad);
          localStorage.setItem('carAds', JSON.stringify(ads));
          window.location.href = "ads.html";
        };
        reader.readAsDataURL(imageFile);
      }
    });
  </script>
</body>
</html>
